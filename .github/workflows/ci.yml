name: Continuous Integration

on:
  push:
    branches: [main, develop]
    paths_ignore:
      [
        "**.md",
        ".env",
        ".gitignore",
        ".prettierrc",
        ".prettierignore",
        ".github",
      ]
  pull_request:
    branches: [develop]
  workflow_dispatch:

jobs:
  ci:
    uses: Pinehood/ph-devops/.github/workflows/reusable-node-ci.yml@master
    secrets: inherit
    with:
      ecr_repository: "ph-auto-alter-art-influ"
